<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
        .modal-overlay {
            display: none; /* Hidden by default */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.5); /* Dim background */
        }

        .modal-content {
            background-color: #2e3440; /* Dark background */
            color: #d8dee9; /* Light text */
            margin: 10% auto;
            /* padding: 20px; */
            border: 4px solid #4c566a;
            border-radius: 5px;
            width: 80%;
            min-width: 640px;
            max-width: 800px; /* Control the max width */
            position: relative;
        }

        .modal-button-bar {
            display: block;
            position: relative;
            width: 100%;
            height: 40px;
            /* border: 1px dotted red; */
            background-color: black;
        }

        .modal-body {
            padding: 0 20px 20px 20px;
        }

        .modal-body h3 {
            text-align: center;
            font-size: 1.5em;
            margin: 0.5em auto;
            color: black;
            background-color: rgba(255, 255, 255, 0.5); /* Semi-transparent background */
            /* border: 1px dotted red; */
        }

        .modal-body #help-modal-text {
            background-color: #3b4252;
            padding: 5px;
        }

        .modal-body p a {
            background-color: rgba(255, 255, 255, 0.5);
        }

        .modal-content #about-dialog {
            --noop: true; /* Prevents any unintended styles from being applied */
        }

        .modal-close-button {
            color: #aaa;
            position: absolute;
            top: 3px;
            right: 3px;
            font-size: 32px;
            font-weight: bold;
            background: none;
            border: none;
            cursor: pointer;
        }

        .modal-close-button:hover,
        .modal-close-button:focus {
            color: #eceff4;
            text-decoration: none;
        }

        /* Use <pre> for pre-formatted text to respect whitespace from Go string */
        .modal-content pre {
            white-space: pre-wrap; /* Wrap long lines */
            word-wrap: break-word;
            background-color: #3b4252;
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
    <title>Markdown Reader</title>
</head>
<body>
<div id="app"></div>
<script src="./src/main.ts" type="module"></script>
<!-- Help Modal HTML Start -->
<div id="help-modal-overlay" class="modal-overlay">
    <div id="help-modal-content" class="modal-content">
        <div class="modal-button-bar">
            <button id="help-modal-close" class="modal-close-button">&times;</button>
        </div>
        <div class="modal-body">
            <h3 id="help-modal-title"></h3>
            <div id="help-modal-text"></div>
        </div>
    </div>
</div>
<!-- Help Modal HTML End -->
<script type="text/javascript">
    // Open all links externally
    document.body.addEventListener('click', function(e) {
    if (e.target && e.target.nodeName == 'A' && e.target.href) {
        const url = e.target.href;
        // const regex = /^(?:https?|ftps?|file):\/\//i;
        if (
            !url.startsWith('http://#') &&
            !url.startsWith('file://') &&
            !url.startsWith('http://wails.localhost:') &&
            !url.startsWith('#')
        ) {
            e.preventDefault();
            window.runtime.BrowserOpenURL(url);
        }
    }
    });
</script>
</body>
</html>
