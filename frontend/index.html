<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <style>
        .modal-overlay {
            display: none; /* Hidden by default */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.5); /* Dim background */
        }

        .modal-content {
            background-color: #2e3440; /* Dark background */
            color: #d8dee9; /* Light text */
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #4c566a;
            border-radius: 5px;
            width: 80%;
            max-width: 650px; /* Control the max width */
            position: relative;
        }

        .modal-close-button {
            color: #aaa;
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 28px;
            font-weight: bold;
            background: none;
            border: none;
            cursor: pointer;
        }

        .modal-close-button:hover,
        .modal-close-button:focus {
            color: #eceff4;
            text-decoration: none;
        }

        /* Use <pre> for pre-formatted text to respect whitespace from Go string */
        .modal-content pre {
            white-space: pre-wrap; /* Wrap long lines */
            word-wrap: break-word;
            background-color: #3b4252;
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
    <title>markdown-reader</title>
</head>
<body>
<div id="app"></div>
<script src="./src/main.ts" type="module"></script>
<!-- Help Modal HTML -->
<div id="help-modal-overlay" class="modal-overlay">
    <div id="help-modal-content" class="modal-content">
        <button id="help-modal-close" class="modal-close-button">&times;</button>
        <h3>Command-Line Options</h3>
        <pre id="help-modal-text"></pre>
    </div>
</div>
<script type="text/javascript">
    // Open all links externally
    document.body.addEventListener('click', function(e) {
    if (e.target && e.target.nodeName == 'A' && e.target.href) {
        const url = e.target.href;
        // const regex = /^(?:https?|ftps?|file):\/\//i;
        if (
            !url.startsWith('http://#') &&
            !url.startsWith('file://') &&
            !url.startsWith('http://wails.localhost:') &&
            !url.startsWith('#')
        ) {
            e.preventDefault();
            window.runtime.BrowserOpenURL(url);
        }
    }
    });
</script>
</body>
</html>
