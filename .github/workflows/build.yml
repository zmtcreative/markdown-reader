name: Build Windows App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          $gopathBin = Join-Path (go env GOPATH) 'bin'
          $gopathBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend assets
        working-directory: frontend
        run: npm run build

      - name: Run Go tests
        run: go test ./...

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install chromium

      - name: Run frontend tests
        shell: pwsh
        env:
          CI: 'true'
        run: ./scripts/Run-FrontendTests.ps1 -TestSuite main

  build-windows:
    needs: test
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          $gopathBin = Join-Path (go env GOPATH) 'bin'
          $gopathBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Windows application
        shell: pwsh
        run: ./scripts/Build-WailsInstaller.ps1 -Build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: markdown-reader-windows
          path: build/bin/**
          if-no-files-found: error

  release:
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: markdown-reader-windows
          path: release-assets

      - name: Publish tagged release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.exe
            release-assets/*.sha1
            release-assets/*.sha256
          generate_release_notes: true