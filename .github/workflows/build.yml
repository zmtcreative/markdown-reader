name: Build Windows App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  test:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          $gopathBin = Join-Path (go env GOPATH) 'bin'
          $gopathBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend assets
        working-directory: frontend
        run: npm run build

      - name: Run Go tests
        run: go test ./...

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install chromium

      - name: Run frontend tests
        shell: pwsh
        env:
          CI: 'true'
        run: ./scripts/Run-FrontendTests.ps1 -TestSuite main

  build-windows:
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          $gopathBin = Join-Path (go env GOPATH) 'bin'
          $gopathBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install NSIS
        shell: pwsh
        run: |
          winget install --id NSIS.NSIS --exact --silent --accept-package-agreements --accept-source-agreements
          $nsisDir = @(
            (Join-Path ${env:ProgramFiles(x86)} 'NSIS'),
            (Join-Path $env:ProgramFiles 'NSIS')
          ) | Where-Object { Test-Path (Join-Path $_ 'makensis.exe') } | Select-Object -First 1
          if (-not $nsisDir) {
            throw 'NSIS installed, but makensis.exe was not found in the expected install directories.'
          }
          $nsisDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:Path += ';' + $nsisDir
          Get-Command makensis

      - name: Build Windows application
        shell: pwsh
        run: ./scripts/Build-WailsInstaller.ps1 -NSIS

      - name: Zip installer package
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path build/bin -Filter *-installer.exe | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw 'No NSIS installer executable found in build/bin.'
          }
          $zipPath = Join-Path $installer.DirectoryName ($installer.BaseName + '.zip')
          Compress-Archive -Path $installer.FullName -DestinationPath $zipPath -Force

      - name: Write zip hashes
        shell: pwsh
        run: |
          $zipFile = Get-ChildItem -Path build/bin -Filter *-installer.zip | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $zipFile) {
            throw 'No installer zip file found in build/bin.'
          }
          $sha256Hash = (Get-FileHash $zipFile.FullName -Algorithm SHA256).Hash
          $sha1Hash = (Get-FileHash $zipFile.FullName -Algorithm SHA1).Hash
          "$sha256Hash  $($zipFile.Name)" | Out-File -FilePath ($zipFile.FullName + '.sha256') -Encoding utf8
          "$sha1Hash  $($zipFile.Name)" | Out-File -FilePath ($zipFile.FullName + '.sha1') -Encoding utf8

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: markdown-reader-windows
          path: build/bin/**
          if-no-files-found: error

  release:
    needs: build-windows
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: markdown-reader-windows
          path: release-assets

      - name: Publish tagged release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.zip
            release-assets/*.zip.sha1
            release-assets/*.zip.sha256
          generate_release_notes: true