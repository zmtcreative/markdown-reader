name: Build Windows App

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'scratch/**'
      - 'tmp/**'
    tags:
      - 'v*'

jobs:
  test:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          $gopathBin = Join-Path (go env GOPATH) 'bin'
          $gopathBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend assets
        working-directory: frontend
        run: npm run build

      - name: Run Go tests
        run: go test ./...

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install chromium

      - name: Run frontend tests
        shell: pwsh
        env:
          CI: 'true'
        run: ./scripts/Run-FrontendTests.ps1 -TestSuite main

  build-windows:
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          $gopathBin = Join-Path (go env GOPATH) 'bin'
          $gopathBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install NSIS
        shell: pwsh
        run: |
          winget install --id NSIS.NSIS --exact --silent --accept-package-agreements --accept-source-agreements
          $nsisDir = @(
            (Join-Path ${env:ProgramFiles(x86)} 'NSIS'),
            (Join-Path $env:ProgramFiles 'NSIS')
          ) | Where-Object { Test-Path (Join-Path $_ 'makensis.exe') } | Select-Object -First 1
          if (-not $nsisDir) {
            throw 'NSIS installed, but makensis.exe was not found in the expected install directories.'
          }
          $nsisDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:Path += ';' + $nsisDir
          Get-Command makensis

      - name: Build Windows application
        shell: pwsh
        run: ./scripts/Build-WailsInstaller.ps1 -NSIS

      - name: Zip installer package
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path build/bin -Filter *-installer.exe | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw 'No NSIS installer executable found in build/bin.'
          }
          $zipPath = Join-Path $installer.DirectoryName ($installer.BaseName + '.zip')
          Compress-Archive -Path $installer.FullName -DestinationPath $zipPath -Force

      - name: Write zip hashes
        shell: pwsh
        run: |
          $zipFile = Get-ChildItem -Path build/bin -Filter *-installer.zip | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $zipFile) {
            throw 'No installer zip file found in build/bin.'
          }
          $sha256Hash = (Get-FileHash $zipFile.FullName -Algorithm SHA256).Hash
          $sha1Hash = (Get-FileHash $zipFile.FullName -Algorithm SHA1).Hash
          "$sha256Hash  $($zipFile.Name)" | Out-File -FilePath ($zipFile.FullName + '.sha256') -Encoding utf8
          "$sha1Hash  $($zipFile.Name)" | Out-File -FilePath ($zipFile.FullName + '.sha1') -Encoding utf8

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: markdown-reader-windows
          path: build/bin/**
          if-no-files-found: error

  build-linux-tar-gz:
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend assets
        working-directory: frontend
        run: npm run build

      - name: Build Linux executable
        run: wails build -tags webkit2_41

      - name: Create tar.gz package
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE_DIR="build/package/linux-tar-gz"
          mkdir -p "$STAGE_DIR"

          BINARY_PATH=$(find build/bin -maxdepth 1 -type f -name 'md-reader*' ! -name '*.sha*' | head -n 1)
          if [ -z "$BINARY_PATH" ]; then
            echo "No Linux binary found in build/bin" >&2
            exit 1
          fi

          cp "$BINARY_PATH" "$STAGE_DIR/md-reader"
          chmod +x "$STAGE_DIR/md-reader"

          tar -C "$STAGE_DIR" -czf "build/bin/markdown-reader-${VERSION}-linux-amd64.tar.gz" .

      - name: Write archive hashes
        run: |
          set -euo pipefail
          ARCHIVE=$(find build/bin -maxdepth 1 -type f -name 'markdown-reader-*-linux-amd64.tar.gz' | head -n 1)
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          sha1sum "$ARCHIVE" > "$ARCHIVE.sha1"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: markdown-reader-linux
          path: |
            build/bin/*.tar.gz
            build/bin/*.tar.gz.sha1
            build/bin/*.tar.gz.sha256
          if-no-files-found: error

  release:
    needs:
      - build-windows
      - build-linux-tar-gz
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: markdown-reader-windows
          path: release-assets/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v8
        with:
          name: markdown-reader-linux
          path: release-assets/linux

      - name: Extract changelog section for tag
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $releaseNotesPath = Join-Path $env:GITHUB_WORKSPACE 'release-notes.md'
          $lines = Get-Content CHANGELOG.md
          $start = $null
          $end = $lines.Count

          for ($index = 0; $index -lt $lines.Count; $index++) {
            if ($lines[$index] -match "^##\s+$([regex]::Escape($tag))(\s+-\s+.*)?$") {
              $start = $index + 1
              continue
            }

            if ($start -ne $null -and $lines[$index] -match '^##\s+') {
              $end = $index
              break
            }
          }

          if ($start -eq $null) {
            throw "No changelog section found for tag $tag in CHANGELOG.md"
          }

          $bodyLines = $lines[$start..($end - 1)]
          $body = ($bodyLines -join "`n").Trim()
          if ([string]::IsNullOrWhiteSpace($body)) {
            throw "Changelog section for tag $tag is empty"
          }

          $body | Out-File -FilePath $releaseNotesPath -Encoding utf8

      - name: Verify extracted release notes
        id: release_notes
        shell: pwsh
        run: |
          $releaseNotesPath = Join-Path $env:GITHUB_WORKSPACE 'release-notes.md'
          if (-not (Test-Path $releaseNotesPath)) {
            throw "Expected release notes file was not created: $releaseNotesPath"
          }
          $content = Get-Content $releaseNotesPath -Raw
          if ([string]::IsNullOrWhiteSpace($content)) {
            throw "Extracted release notes file is empty: $releaseNotesPath"
          }
          Write-Host "Release notes extracted to: $releaseNotesPath"
          Write-Host $content

          $delimiter = [guid]::NewGuid().ToString()
          "body<<$delimiter" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $content | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $delimiter | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish tagged release assets
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.release_notes.outputs.body }}
          make_latest: legacy
          files: |
            release-assets/windows/*.zip
            release-assets/windows/*.zip.sha1
            release-assets/windows/*.zip.sha256
            release-assets/linux/*.tar.gz
            release-assets/linux/*.tar.gz.sha1
            release-assets/linux/*.tar.gz.sha256